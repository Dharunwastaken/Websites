    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    .btn-secondary { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:50px; font-weight:600; font-size:14px; background:transparent; border:2px solid rgba(255,255,255,.4); color:#fff; cursor:pointer; transition:all .25s; text-decoration:none; }
    .btn-secondary:hover { background:rgba(255,255,255,.15); transform:translateY(-2px); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; transition:all .3s; }
    .card:hover { transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,.12); }
    .section-label { font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); }
    .section-title { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3rem); font-weight:700; line-height:1.1; color:var(--text); }
    .input-field { width:100%; padding:12px 16px; border-radius:12px; font-size:14px; border:1px solid var(--border); background:var(--bg); color:var(--text); outline:none; transition:border-color .2s; font-family:'Inter',sans-serif; }
    .input-field:focus { border-color:var(--accent); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes bounce-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
    .anim-fadeup { animation: fadeUp .6s ease forwards; }
    .particle { animation: float linear infinite; }
    .bounce { animation: bounce-slow 1.5s ease-in-out infinite; }
    .masonry { columns: 2; column-gap: 1rem; }
    @media(min-width:768px) { .masonry { columns: 3; } }
    @media(min-width:1024px) { .masonry { columns: 4; } }
    .masonry-item { break-inside:avoid; margin-bottom:1rem; }
    img { max-width:100%; display:block; }

// ─── HOOK ────────────────────────────────────────────────────────────────────
function useDarkMode() {
  const [dark, setDark] = useState(() => {
    try { const s = localStorage.getItem('ab-theme'); if(s) return s==='dark'; } catch(e){}
    return window.matchMedia('(prefers-color-scheme:dark)').matches;
  });
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    try { localStorage.setItem('ab-theme', dark ? 'dark' : 'light'); } catch(e){}
  }, [dark]);
  return [dark, setDark];
}

// ─── NAVBAR ──────────────────────────────────────────────────────────────────
function Navbar({ dark, toggle }) {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [active, setActive] = useState('home');
  const links = [
    {label:'Home',id:'home'},{label:'Menu',id:'menu'},{label:'About',id:'about'},
    {label:'Gallery',id:'gallery'},{label:'Contact',id:'contact'},
  ];

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); });
    }, { threshold:0.3, rootMargin:'-80px 0px -60% 0px' });
    links.forEach(l => { const el=document.getElementById(l.id); if(el) obs.observe(el); });
    return () => { window.removeEventListener('scroll', onScroll); obs.disconnect(); };
  }, []);

  const go = id => { setOpen(false); document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); };

  return (
    <>
      <nav style={{
        position:'fixed', top:0, left:0, right:0, zIndex:50,
        transition:'all .3s',
        background: scrolled ? (dark ? 'rgba(26,14,0,.94)' : 'rgba(250,246,241,.94)') : 'transparent',
        backdropFilter: scrolled ? 'blur(20px)' : 'none',
        borderBottom: scrolled ? `1px solid ${dark ? '#3d2c1e' : '#e8ddd3'}` : '1px solid transparent',
      }}>
        <div style={{maxWidth:'1280px', margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', height:'70px'}}>
          <button onClick={()=>go('home')} style={{display:'flex',alignItems:'center',gap:'10px',background:'none',border:'none',cursor:'pointer'}}>

            <div style={{textAlign:'left'}}>

            </div>
          </button>

          <div style={{display:'flex',alignItems:'center',gap:4}} className="hidden-mobile">
            {links.map(l => (
              <button key={l.id} onClick={()=>go(l.id)} style={{
                padding:'8px 16px', borderRadius:10, background:'none', border:'none',
                fontSize:14, fontWeight:500, cursor:'pointer',
                color: active===l.id ? 'var(--accent)' : 'var(--muted)',
                transition:'color .2s',
              }}>{l.label}</button>
            ))}
          </div>

          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={()=>toggle(!dark)} style={{
              width:36,height:36,borderRadius:10,border:'none',cursor:'pointer',
              background:'var(--border)',color:'var(--text)',display:'flex',alignItems:'center',justifyContent:'center',
              transition:'transform .2s',
            }} onMouseEnter={e=>e.target.style.transform='scale(1.1)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}>
              <Icon path={dark ? ICONS.sun : ICONS.moon} size={16} />
            </button>
            <button onClick={()=>go('reservations')} className="btn-primary hidden-mobile" style={{padding:'10px 20px',fontSize:13}}>
              Book a Table
            </button>
            <button onClick={()=>setOpen(!open)} style={{
              width:36,height:36,borderRadius:10,border:'none',cursor:'pointer',
              background:'var(--border)',color:'var(--text)',display:'none',alignItems:'center',justifyContent:'center',
            }} className="show-mobile" id="mob-btn">
              <Icon path={open ? ICONS.x : ICONS.menu} size={16} />

          </div>

      {open && (

              background: active===l.id ? 'rgba(217,119,6,.1)' : 'transparent',
              border:'none',borderRadius:12,fontSize:15,fontWeight:500,cursor:'pointer',
              color: active===l.id ? 'var(--accent)' : 'var(--text)', marginBottom:4,

            Book a Table

        @media(min-width:769px){.show-mobile{display:none!important;}}

              <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=700&q=75" alt="Café seating" loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover'}} />
            </div>
          </div>

          <div className="card" style={{padding:'28px 28px 32px'}}>
            {done ? (
              <div style={{textAlign:'center',padding:'32px 0'}}>
                <div style={{fontSize:56,marginBottom:16}}>✅</div>
                <h3 style={{fontFamily:'Playfair Display,serif',fontSize:24,fontWeight:700,color:'var(--text)',marginBottom:8}}>Table Reserved!</h3>
                <p style={{color:'var(--muted)',fontSize:14}}>We'll confirm via WhatsApp. See you soon, {f.name||'friend'}! ☕</p>
              </div>
            ) : (
              <form onSubmit={submit}>
                <h3 style={{fontFamily:'Playfair Display,serif',fontSize:20,fontWeight:700,color:'var(--text)',marginBottom:20}}>Reserve a Table</h3>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Name *</label>
                    <input name="name" value={f.name} onChange={update} required placeholder="Your name" className="input-field" />
                  </div>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Phone *</label>
                    <input name="phone" value={f.phone} onChange={update} required placeholder="+91 98765 43210" className="input-field" />
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Date *</label>
                    <input type="date" name="date" value={f.date} onChange={update} required min={tomorrow()} className="input-field" />
                  </div>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Time *</label>
                    <select name="time" value={f.time} onChange={update} required className="input-field">
                      <option value="">Select time</option>
                      {times.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Guests</label>
                    <select name="guests" value={f.guests} onChange={update} className="input-field">
                      {['1','2','3','4','5','6','7','8+'].map(n=><option key={n} value={n}>{n} {n==='1'?'guest':'guests'}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Occasion</label>
                    <select name="occasion" value={f.occasion} onChange={update} className="input-field">
                      <option value="">None</option>
                      <option value="birthday">Birthday 🎂</option>
                      <option value="anniversary">Anniversary 💕</option>
                      <option value="business">Business meeting</option>
                      <option value="date">Date</option>
                    </select>
                  </div>
                </div>
                <button type="submit" className="btn-primary" style={{width:'100%',justifyContent:'center',fontSize:15,padding:'14px 28px'}}>
                  Confirm Reservation
                </button>
                <p style={{textAlign:'center',color:'var(--muted)',fontSize:12,marginTop:12}}>We'll confirm via WhatsApp within 15 minutes.</p>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── CONTACT ─────────────────────────────────────────────────────────────────
function Contact() {
  const [email, setEmail] = useState('');
  const [subbed, setSubbed] = useState(false);
  const info = [
    {icon:ICONS.mapPin,label:'Address',value:'123 Sunrise Avenue, Hitech City, Hyderabad – 500081'},
    {icon:ICONS.phone,label:'Phone',value:'+91 98765 43210'},
    {icon:ICONS.mail,label:'Email',value:'hello@aurorabrewcafe.com'},
    {icon:ICONS.clock,label:'Hours',value:'Mon–Fri 7AM–9PM · Sat 8AM–10PM · Sun 8AM–8PM'},
  ];
  return (
    <section id="contact" style={{padding:'80px 0',background:'var(--surface)'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px'}}>
        <div style={{textAlign:'center',marginBottom:48}}>
          <div className="section-label" style={{marginBottom:10}}>Find us</div>
          <h2 className="section-title" style={{marginBottom:10}}>Get in touch</h2>
          <p style={{color:'var(--muted)',fontSize:15}}>We're always happy to hear from you.</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:32}}>
          <div>
            {info.map(({icon,label,value})=>(
              <div key={label} className="card" style={{display:'flex',gap:14,padding:'16px 18px',marginBottom:12}}>
                <div style={{width:38,height:38,borderRadius:12,background:'rgba(217,119,6,.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon path={icon} size={15} style={{color:'var(--accent)'}} />
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'var(--muted)',marginBottom:3}}>{label}</div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{value}</div>
                </div>
              </div>
            ))}
            <div className="card" style={{padding:'16px 18px',marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:4}}>Join the Aurora Coffee Club</div>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Seasonal menus, exclusive offers, café events.</p>
              {subbed ? <p style={{color:'#16a34a',fontSize:13,fontWeight:600}}>✓ You're on the list!</p> : (
                <div style={{display:'flex',gap:8}}>
                  <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" className="input-field" style={{flex:1}} />
                  <button onClick={()=>{if(email)setSubbed(true);}} style={{padding:'10px 16px',borderRadius:10,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
                    <Icon path={ICONS.send} size={13} /> Subscribe
                  </button>
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:10}}>
              {[ICONS.instagram,ICONS.facebook,ICONS.twitter].map((p,i)=>(
                <a key={i} href="#" style={{width:38,height:38,borderRadius:12,border:'1px solid var(--border)',background:'var(--bg)',color:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',transition:'all .2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                  <Icon path={p} size={15} />
                </a>
              ))}
            </div>
          </div>
          <div style={{borderRadius:20,overflow:'hidden',border:'1px solid var(--border)',minHeight:400}}>
            <iframe
              title="Aurora Brew Location"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3806.4!2d78.374!3d17.443!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb938b92e08fd7%3A0x3b5d4b9f4e8bb7c2!2sHitech%20City%2C%20Hyderabad!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
              width="100%" height="100%" style={{border:0,minHeight:400,display:'block'}} allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade"
            />
          </div>
        </div>
      </div>
    </section>
  );
}

            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#d97706,#b45309)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon path={ICONS.coffee} size={17} style={{color:'white'}} />
              </div>
              <div>
                <div style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:17,color:'white',lineHeight:1}}>Aurora</div>

              </div>
            </div>

            <div style={{display:'flex',gap:10}}>
              {[ICONS.instagram,ICONS.facebook,ICONS.twitter].map((p,i)=>(

              <div key={d} style={{marginBottom:10}}>

              [ICONS.phone,'+91 98765 43210'],
              [ICONS.mail,'hello@aurorabrewcafe.com'],

              <div key={val} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:12}}>

        <div style={{paddingTop:28,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,.25)'}}>© 2026 Aurora Brew Cafe. All rights reserved. Designed by Ashmith.</p>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#d97706,#b45309)',border:'none',cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center',transition:'transform .2s'}}
